@if (!hasFrames() && visualizing()) {
  <div class="info">
    <img src="/assets/angie-question.svg" alt="Angie illustration" />
    <p>There's no information to show.</p>
  </div>
}

@if (hasFrames()) {
  <ng-recording-timeline-controls
    (exportProfile)="exportProfile.emit($event)"
    (filter)="setFilter($event)"
  />
  <ng-frame-selector [frames]="frames()" (selectFrames)="selectFrames.set($event.indexes)" />
}

@let frame = this.frame();

@if (hasFrames() && !frame) {
  <div class="info">
    <img src="/assets/angie-magnifying-glass.svg" alt="Angie illustration" />
    <p>Select a bar to preview a particular change detection cycle.</p>
  </div>
} @else if (hasFrames() && frame) {
  <ng-visualizer-controls
    [record]="frame"
    [estimatedFrameRate]="currentFrameRate()"
    [(visualizationMode)]="visualizationMode"
    [(changeDetection)]="changeDetection"
  />
  <ng-recording-visualizer
    [visualizationMode]="visualizationMode()"
    [frame]="frame"
    [changeDetection]="changeDetection()"
  />
}
