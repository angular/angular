<!-- #docregion -->
<h2>Hero List</h2>

<p><em>Select a hero from the list to see details.</em></p>
<ul>
  @for (hero of heroes; track hero) {
    <li>
      <button type="button" (click)="selectHero(hero)">
        {{ hero.name }}
      </button>
    </li>
  }
</ul>

@if (selectedHero) {
  <app-hero-detail [hero]="selectedHero"></app-hero-detail>
}
