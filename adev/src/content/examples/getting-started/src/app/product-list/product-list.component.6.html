<h2>Products</h2>

@for(product of products; track $index) {

  <h3>
    <a [title]="product.name + ' details'">
      {{ product.name }}
    </a>
  </h3>

  @if(product.description) {
    <p>Description: {{ product.description }}</p>
  }

<!-- #docregion on-notify -->
  <button type="button" (click)="share()">
    Share
  </button>

  <app-product-alerts
    [product]="product" 
    (notify)="onNotify()">
  </app-product-alerts>
<!-- #enddocregion on-notify -->

}
