<div ngCombobox #combobox="ngCombobox">
  <div class="combobox-input-container">
    <input placeholder="Select a country..." [value]="value()" />
    <span class="material-symbols-outlined icon arrow-icon" translate="no" aria-hidden="true"
      >arrow_drop_down</span
    >
  </div>

  <ng-template ngComboboxPopup [combobox]="combobox">
    <dialog ngComboboxWidget #dialogWidget="ngComboboxWidget" class="dialog">
      <div ngCombobox #innerCombobox="ngCombobox" filterMode="manual" [alwaysExpanded]="true">
        <div class="combobox-input-container">
          <span class="material-symbols-outlined icon search-icon" translate="no" aria-hidden="true"
            >search</span
          >
          <input class="combobox-input" placeholder="Search..." [(value)]="searchString" />
        </div>

        <ng-template ngComboboxPopup [combobox]="innerCombobox">
          @if (options().length === 0) {
            <div class="no-results">No results found</div>
          }

          <div ngListbox [(value)]="selectedCountries">
            @for (option of options(); track option) {
              <div ngOption [value]="option" [label]="option">
                <span class="option-label">{{ option }}</span>
                <span
                  class="material-symbols-outlined icon check-icon"
                  translate="no"
                  aria-hidden="true"
                  >check</span
                >
              </div>
            }
          </div>
        </ng-template>
      </div>
    </dialog>
  </ng-template>
</div>
