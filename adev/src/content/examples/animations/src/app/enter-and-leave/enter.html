<!-- #docplaster -->
<h2><code>animate.enter</code> Example</h2>

<button type="button"
        [class]="{ 'btn-in-dark-mode': isDarkMode() }"
        (click)="toggle()">Toggle Element</button>

@if (isShown()) {
  <div class="enter-container" animate.enter="enter-animation">
    <p>The box is entering.</p>
  </div>
}
