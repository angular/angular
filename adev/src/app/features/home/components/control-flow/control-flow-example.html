<div class="two-column-step">
  <div class="step-description">
    <div class="header">Управление потоком</div>
    <div class="description">
      Новый синтаксис потока управления Angular делает шаблоны проще для написания и понимания.
    </div>

    <button
      class="docs-primary-btn"
      [attr.text]="'Подробнее об управлении потоком'"
      routerLink="/guide/templates/control-flow"
    >
      Подробнее об управлении потоком
    </button>
  </div>

  <div class="step-code">
    <div class="code-block">
      <div class="code-header">
        <span>my-template.html</span>
        <span class="copy-icon"></span>
      </div>

      <adev-code-block [code]="Example" language="angular-html" />
    </div>
  </div>
</div>
