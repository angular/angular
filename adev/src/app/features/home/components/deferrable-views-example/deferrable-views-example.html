<div class="two-column-step">
  <div class="step-description">
    <div class="header">Отложенные представления</div>
    <div class="description">
      Отложенные представления (также известные как блоки <code>&#64;defer</code>) уменьшают начальный размер бандла
      вашего приложения, откладывая загрузку кода, который не является строго необходимым для
      первоначального рендеринга страницы.
    </div>

    <button
      class="docs-primary-btn"
      [attr.text]="'Подробнее об отложенной загрузке'"
      routerLink="/guide/templates/defer"
    >
      Подробнее об отложенной загрузке
    </button>
  </div>

  <div class="step-code">
    <div class="code-block">
      <div class="code-header">
        <span>data-visualization-page.html</span>
        <span class="copy-icon"></span>
      </div>

      <adev-code-block [code]="exampleHtml" language="angular-html" />
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>data-visualization-page.ts</span>
        <span class="copy-icon"></span>
      </div>

      <adev-code-block [code]="exampleTs" />
    </div>
  </div>
</div>
