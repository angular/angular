<div class="two-column-step">
  <div class="step-description">
    <div class="header">Сигналы: детализированная реактивность</div>
    <div class="description">
      Введите текст в поле поиска для фильтрации списка. Вычисляемый сигнал
      <code>computed</code> автоматически пересчитывает
      <code>filteredItems</code> при каждом изменении сигнала <code>searchTerm</code>.
    </div>

    <div class="demo-display">
      <input
        [value]="searchTerm()"
        (input)="onSearch($event.target.value)"
        placeholder="Поиск фруктов..."
        class="demo-input"
      />
      <div class="demo-list">
        @for (item of filteredItems(); track item) {
          <div class="demo-item">{{ item }}</div>
        }
      </div>
    </div>

    <button
      class="docs-primary-btn"
      [attr.text]="'Подробнее о сигналах'"
      routerLink="/guide/signals"
    >
      Подробнее о сигналах
    </button>
  </div>

  <div class="step-code">
    <div class="code-block">
      <div class="code-header">
        <span>component.ts</span>
        <span class="copy-icon"></span>
      </div>

      <adev-code-block [code]="tsExample" />
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>component.html</span>
        <span class="copy-icon"></span>
      </div>
      <adev-code-block [code]="htmlExample" language="angular-html" />
    </div>
  </div>
</div>
